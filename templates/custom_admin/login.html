<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VFL Tournament Portal - Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 flex items-center justify-center h-screen text-gray-100">
    <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-sm border border-gray-700">
        <div class="text-center mb-6">
            <h2 class="text-2xl font-bold tracking-wide text-blue-400">VFL Admin Portal</h2>
            <p class="text-xs text-gray-400 mt-1">Vaikom Football League Management Console</p>
        </div>
        
        {% if messages %}
            {% for message in messages %}
                <div class="bg-red-500/20 border border-red-500 text-red-200 text-xs p-3 rounded-xl mb-4 text-center font-medium">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        
        <form method="POST">
            {% csrf_token %}
            <div class="mb-4">
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5">Username</label>
                <input type="text" name="username" placeholder="Enter administrative username" class="w-full p-3 bg-gray-700/50 rounded-xl border border-gray-600 focus:outline-none focus:border-blue-500 text-sm transition" required>
            </div>
            <div class="mb-6">
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5">Password</label>
                <input type="password" name="password" placeholder="••••••••" class="w-full p-3 bg-gray-700/50 rounded-xl border border-gray-600 focus:outline-none focus:border-blue-500 text-sm transition" required>
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-xl font-bold transition shadow-lg shadow-blue-600/20 text-sm">Sign In</button>
        </form>
    </div>
</body>
</html>
